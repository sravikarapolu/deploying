<!DOCTYPE html>
<html>
<head>
    <title>SentinelNet Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #0b1220;
            color: white;
            font-family: Arial;
            margin: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
            color: #00c3ff;
        }

        .container {
            text-align: center;
            margin: 20px;
        }

        input, button {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #00c3ff;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        .charts {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .card {
            background: #121a2f;
            padding: 20px;
            border-radius: 10px;
            width: 40%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        canvas {
            max-width: 300px;
            max-height: 300px;
        }

        .btn-live {
            margin-top: 30px;
            background: #28a745;
        }
    </style>
</head>

<body>

<h1>SentinelNet - AI Attack Dashboard</h1>

<div class="container">
    <input type="file" id="fileInput">
    <button onclick="uploadFile()">Upload & Analyze</button>
</div>

<div class="charts">
    <div class="card">
        <h3>Attack Share</h3>
        <canvas id="pieChart"></canvas>
    </div>

    <div class="card">
        <h3>Attack Count</h3>
        <canvas id="barChart"></canvas>
    </div>
</div>

<div class="container">
    <button class="btn-live" onclick="goLive()">Go to Live Monitor</button>
</div>

<script>
function uploadFile() {
    let file = document.getElementById("fileInput").files[0];

    let formData = new FormData();
    formData.append("file", file);

    fetch("https://setinelnet.onrender.com/upload", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        let labels = Object.keys(data.counts);
        let values = Object.values(data.counts);

        // PIE
        new Chart(document.getElementById('pieChart'), {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: [
                        '#00c3ff', '#ff4d4d', '#ffa500', '#28a745', '#a64dff'
                    ]
                }]
            }
        });

        // BAR
        new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: "Attack Count",
                    data: values,
                    backgroundColor: '#00c3ff'
                }]
            }
        });

    });
}

function goLive() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
